[pytest]
# Pytest configuration for OrbStack NixOS provisioning tests

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    requires_orbstack: marks tests that require OrbStack to be installed

# Output options
addopts =
    -v
    --tb=short
    --strict-markers

# Timeout settings (requires pytest-timeout)
# Default timeout for all tests
timeout = 300

# Timeout method
timeout_method = thread

# Coverage options (if using pytest-cov)
# Uncomment these if you want to collect coverage
# addopts = --cov=provision_orbstack --cov-report=html --cov-report=term

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Warnings
filterwarnings =
    error
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# Minimum version
minversion = 7.0
